<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Roger - Punk Rock</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; text-transform: uppercase; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 2px solid #fff; position: sticky; top: 0; background: #000; z-index: 100; }
        .nav-logo img { height: 60px; }
        section { padding: 50px 20px; border-bottom: 1px solid #222; max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        img { width: 100%; height: auto; border: 2px solid #fff; }
        h2 { font-size: 3rem; color: #ff0000; margin-bottom: 20px; }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .photo-grid img { height: 250px; object-fit: cover; }
        @media (max-width: 768px) { .grid, .photo-grid { grid-template-columns: 1fr; } h2 { font-size: 2rem; } }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo"><img src="Goodmorningrogerlogo.png" alt="Logo GMR"></div>
    <div>PUNK ROCK BAND</div>
</nav>

<section id="presentation">
    <h2>GOOD MORNING ROGER</h2>
    <div class="grid">
        <div>
            <p>Punk Rock brut, énergie sans filtre.</p>
            <p>[TA BIO ICI : Clique sur le stylo pour modifier ce texte]</p>
        </div>
        <div class="photo-grid">
            <img src="photo1.jpg" alt="Photo 1">
            <img src="photo2.jpg" alt="Photo 2">
            <img src="photo3.jpg" alt="Photo 3">
            <img src="photo4.jpg" alt="Photo 4">
        </div>
    </div>
</section>

</body>
</html>
