<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Roger | Punk Rock</title>
    <style>
/* 1. IMPORT DES POLICES */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;700&display=swap');

/* 2. STYLE GLOBAL */
body {
    background-color: #0a0a0a;
    color: #ffffff;
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    line-height: 1.6;
}

/* 3. LOGO ET CHAT */
.logo-wrapper {
    position: relative;
    max-width: 450px;
    margin: 40px auto;
    cursor: pointer;
    display: block; /* Important pour le centrage */
}

.logo-groupe-principal {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0px 0px 15px rgba(18, 195, 255, 0.4));
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
    position: relative;
    z-index: 2;
}

.mascotte-pop {
    position: absolute;
    top: -60px;
    left: 60%;
    width: 140px;
    height: auto;
    transform: rotate(-15deg) scale(0); 
    opacity: 0;
    z-index: 1;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    filter: drop-shadow(0px 0px 15px rgba(18, 195, 255, 0.5));
}

.logo-wrapper:hover .logo-groupe-principal { transform: scale(1.08) rotate(3deg); filter: drop-shadow(0px 0px 25px rgba(18, 195, 255, 0.7)); }
.logo-wrapper:hover .mascotte-pop { opacity: 1; transform: rotate(15deg) scale(1); }

/* 4. NAVIGATION */
nav {
    background: rgba(0, 0, 0, 0.9);
    padding: 15px;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid #12C3FF;
    text-align: center;
}

nav a {
    color: #fff;
    text-decoration: none;
    margin: 0 15px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    transition: 0.3s;
    display: inline-block;
}

nav a:hover { color: #12C3FF; transform: scale(1.2) rotate(-2deg); }

/* 5. ARTICLES ET TITRES */
h2 { 
    font-family: 'Bebas Neue', sans-serif; 
    font-size: 4.5rem; 
    color: #12C3FF; 
    text-align: center; 
    margin: 80px 0 40px 0; 
    letter-spacing: 5px; 
    text-shadow: 0 0 15px rgba(18, 195, 255, 0.4); 
}

.article-presentation, .article-actus {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 40px;
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
}

.article-video, .actus-photo { flex: 0 0 280px; }
.article-content, .actus-content { flex: 1; text-align: left; }
.article-content h3, .actus-content h3 { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; margin: 0 0 10px 0; }

.actus-photo img, .presentation-item img { width: 100%; border-radius: 5px; cursor: zoom-in; display: block; }

.presentation-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
}

.presentation-item { border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }

/* 6. VIDEO (Correction affichage) */
.video-container {
    position: relative;
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
}

/* 7. CONCERTS */
.concert-list { max-width: 900px; margin: 40px auto; padding: 0 20px; }
.concert-row {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.03);
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 8px;
    border-left: 4px solid #333;
    transition: 0.3s;
}
.concert-row:hover { background: rgba(18, 195, 255, 0.07); border-left-color: #12C3FF; transform: translateX(10px); }
.concert-date-box { flex: 0 0 80px; text-align: center; border-right: 1px solid #444; margin-right: 25px; padding-right: 15px; }
.date-day { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; color: #12C3FF; }
.concert-lieu { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; display: block; }
.concert-ville { color: #12C3FF; font-size: 0.95rem; font-weight: bold; }
.concert-row-link { text-decoration: none; color: inherit; display: block; margin-bottom: 12px; }

/* 8. CONTACT ET HALO MAIL (La demande) */
.img-mail {
    width: 85px !important;
    height: auto !important;
    display: block !important;
    margin: 30px auto !important;
    transition: all 0.4s ease-in-out !important;
    filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)) !important; /* HALO BLANC FIXE */
}
.img-mail:hover {
    filter: drop-shadow(0 0 15px #12C3FF) drop-shadow(0 0 5px #12C3FF) !important; /* HALO CYAN */
    transform: scale(1.1) !important;
}

.logo-social { width: 40px; height: auto; margin: 0 15px; transition: 0.3s; }
.logo-social:hover { transform: scale(1.1); filter: drop-shadow(0px 0px 8px #12C3FF); }

.streaming-box {
    background-color: #000000;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 30px;
    max-width: 600px;
    margin: 40px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    flex-wrap: wrap;
}

/* 9. REVEAL ET LIGHTBOX */
.reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
.reveal.active { opacity: 1; transform: translateY(0); }
#lightbox {
    display: none;
    position: fixed;
    z-index: 2000;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    align-items: center; justify-content: center;
}
#lightbox img { max-width: 90%; max-height: 80%; border: 3px solid #12C3FF; }

/* 10. RESPONSIVE (MOBILE) */
@media (max-width: 768px) {
    h2 { font-size: 2.8rem; }
    .logo-wrapper { max-width: 80%; }
    .mascotte-pop { width: 100px; top: -40px; }
    .article-presentation, .article-actus { flex-direction: column; align-items: center; text-align: center; }
    .article-content, .actus-content { text-align: center; }
    .concert-row { flex-direction: column; text-align: center; }
    .concert-date-box { border-right: none; margin-right: 0; padding-right: 0; margin-bottom: 10px; }
}
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><img src="" alt="Agrandissement"></div>

    <div class="logo-wrapper">
        <img src="Goodmorningrogerlogo.png" class="logo-groupe-principal" alt="Good Morning Roger Logo">
        <img src="rogerchat.png" class="mascotte-pop" alt="Roger le Chat">
    </div>
