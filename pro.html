<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Pro | Good Morning Roger</title>
    <style>
/* 1. IMPORT DES POLICES */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;700&display=swap');

/* 2. STYLE GLOBAL */
body {
    background-color: #0a0a0a;
    color: #ffffff;
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    line-height: 1.6;
}

/* 3. LOGO, MASCOTTE POP & NAV (STRICTEMENT IDENTIQUE À INDEX) */
.logo-wrapper {
    position: relative;
    max-width: 450px;
    margin: 40px auto;
    cursor: pointer;
}
.logo-groupe-principal {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0px 0px 15px rgba(18, 195, 255, 0.4));
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    z-index: 2; /* Le logo est au-dessus du chat au repos */
}
.mascotte-pop {
    position: absolute;
    top: -60px;
    left: 60%;
    width: 140px;
    height: auto;
    transform: rotate(-15deg) scale(0); 
    opacity: 0;
    z-index: 1; /* LE CHAT EST DERRIÈRE LE LOGO */
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    filter: drop-shadow(0px 0px 15px rgba(18, 195, 255, 0.5));
}
.logo-wrapper:hover .logo-groupe-principal {
    transform: scale(1.08) rotate(3deg);
    filter: drop-shadow(0px 0px 25px rgba(18, 195, 255, 0.7)); /* HALO ACTIVÉ AU SURVOL */
}
.logo-wrapper:hover .mascotte-pop {
    opacity: 1;
    transform: rotate(15deg) scale(1);
}

nav {
    background: rgba(0, 0, 0, 0.9);
    padding: 15px;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid #12C3FF;
    text-align: center;
}
nav a {
    color: #fff;
    text-decoration: none;
    margin: 0 15px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    transition: 0.3s;
    display: inline-block;
}
nav a:hover {
    color: #12C3FF;
    text-shadow: 0px 0px 10px rgba(18, 195, 255, 0.7);
    transform: scale(1.2) rotate(-2deg); /* INCLINAISON RÉACTIVÉE */
}

/* 4. CONTENU SPÉCIFIQUE ESPACE PRO */
h2 { 
    font-family: 'Bebas Neue', sans-serif; 
    font-size: 4.5rem; 
    color: #12C3FF; 
    text-align: center; 
    margin: 80px 0 40px 0; 
    letter-spacing: 5px; 
    text-transform: uppercase; 
    text-shadow: 0 0 15px rgba(18, 195, 255, 0.4); 
}

.pro-container {
    max-width: 800px;
    margin: 0 auto 100px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    border: 1px solid #333;
    text-align: center;
}

.pro-text {
    font-size: 1.2rem;
    margin-bottom: 40px;
}

.password-box {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

input[type="password"] {
    padding: 15px;
    border-radius: 8px;
    border: 2px solid #12C3FF;
    background: #000;
    color: #fff;
    font-size: 1.1rem;
    width: 250px;
    outline: none;
}

.btn-pro {
    padding: 15px 30px;
    border-radius: 8px;
    border: none;
    background: #12C3FF;
    color: #000;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    cursor: pointer;
    transition: 0.3s;
}
.btn-pro:hover {
    background: #fff;
    transform: scale(1.1);
}

#error-msg {
    color: #ff4d4d;
    font-weight: bold;
    margin-top: 20px;
    display: none;
}

/* RESPONSIVE */
@media (max-width: 800px) {
    h2 { font-size: 2.8rem; }
    .logo-wrapper { max-width: 320px; }
    input[type="password"] { width: 100%; }
}
    </style>
</head>
<body>

    <a href="index.html" style="text-decoration: none;">
        <div class="logo-wrapper">
            <img src="Goodmorningrogerlogo.png" class="logo-groupe-principal" alt="Good Morning Roger Logo">
            <img src="rogerchat.png" class="mascotte-pop" alt="Roger le Chat">
        </div>
    </a>

    <nav>
        <a href="index.html#presentation">Présentation</a>
        <a href="index.html#actus">Actus</a>
        <a href="index.html#concerts">Concerts</a>
        <a href="index.html#musiques">Musiques</a>
        <a href="index.html#contact">Contact</a>
        <a href="pro.html" style="color: #12C3FF; border-bottom: 2px solid #12C3FF;">Espace Pro</a>
    </nav>

    <h2>ESPACE PRO</h2>

    <div class="pro-container">
        <p class="pro-text">
            Tu as programmé <strong>Good Morning Roger</strong> ? Très bon choix !<br><br>
            En te connectant ici tu trouveras tous les éléments nécessaires <br>(communication, techniques, etc.)
        </p>

        <div class="password-box">
            <input type="password" id="passInput" placeholder="MOT DE PASSE">
            <button class="btn-pro" onclick="verify()">VALIDER</button>
        </div>

        <p id="error-msg">Oups, c'est le bon code !</p>
    </div>

    <script>
        function verify() {
            const inputVal = document.getElementById('passInput').value;
            const error = document.getElementById('error-msg');
            const driveLink = "https://drive.google.com/drive/folders/12jIgEcx42RbfitwHfGqMaTeCGtrOwEV7?usp=drive_link";

            // Mot de passe : GMRchat (encodé pour plus de discrétion)
            if (btoa(inputVal) === "R01SY2hhdA==") {
                window.location.href = driveLink;
            } else {
                error.style.display = "block";
                document.getElementById('passInput').value = "";
            }
        }

        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verify();
        });
    </script>

</body>
</html>
